apiVersion: skaffold/v2beta14
kind: Config
build:
   artifacts:
      - image:  hanzoai/platform
        context: ../platform
        sync:
           infer:
              - '**/*.js'
              - '**/*.json'
              - '**/*.yaml'
        docker:
           dockerfile: Dockerfile.dev
      - image: hanzoai/sync
        context: ../sync
        sync:
           infer:
              - '**/*.js'
              - '**/*.json'
        docker:
           dockerfile: Dockerfile.dev
      - image: hanzoai/monitor
        context: ../monitor
        sync:
          infer:
              - '**/*.js'
              - '**/*.json'
        docker:
          dockerfile: Dockerfile.dev
      - image: hanzoai/webhook
        context: ../webhook
        sync:
          infer:
              - '**/*.go'
        docker:
          dockerfile: Dockerfile.dev
deploy:
   statusCheckDeadlineSeconds: 300
   kubectl:
      defaultNamespace: hanzo
      manifests:
         - platform.yaml
         - monitor.yaml
         - sync.yaml
         - webhook.yaml
